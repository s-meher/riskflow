spring.application.name=RiskFlow

# PostgreSQL — set credentials for your environment
spring.datasource.url=jdbc:postgresql://localhost:5432/riskflow
spring.datasource.username=riskflow
spring.datasource.password=riskflow
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=8080
